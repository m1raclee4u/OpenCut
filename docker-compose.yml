# OpenCut web editor, доступен через nginx основного стека (web-smm)
# по адресу https://rieltai.ru/editor
#
# Порядок запуска:
#   1. Сначала поднять основной стек:  cd ~/Documents/smm-ai/web-smm && docker compose up -d
#      (он создаёт сеть web-smm_default, к которой подключается editor)
#   2. Потом этот:                     cd ~/editor && docker compose up -d --build
#
# Наружу порт не публикуется — nginx ходит в editor:3000 по общей docker-сети.

services:
  editor:
    build:
      context: ./apps/web
      args:
        # Подпуть, под которым приложение живёт за nginx
        VITE_BASE_PATH: /editor/
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - default
      - web-smm
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/editor/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  # Сеть основного стека web-smm (создаётся его `docker compose up`).
  # Если compose-проект web-smm называется иначе — поправьте name.
  web-smm:
    external: true
    name: web-smm_default
